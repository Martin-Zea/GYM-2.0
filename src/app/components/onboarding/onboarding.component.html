<div class="onboarding-overlay" role="dialog" [attr.aria-label]="T().app_name" aria-modal="true">
  <div class="onboarding-panel">
    <div class="slides-viewport">
      <div
        class="slides-track"
        [style.transform]="'translateX(calc(-' + current() + ' * 100% / ' + slideCount + '))'"
      >
        <div class="slide">
          <div class="slide-icon-wrap">
            <app-icon name="dumbbell" [size]="52" />
          </div>
          <h2 class="slide-title">{{ T().onboarding_slide1_title }}</h2>
          <p class="slide-desc">{{ T().onboarding_slide1_desc }}</p>
        </div>

        <div class="slide">
          <div class="slide-icon-wrap">
            <app-icon name="sparkle" [size]="52" />
          </div>
          <h2 class="slide-title">{{ T().onboarding_slide2_title }}</h2>
          <p class="slide-desc">{{ T().onboarding_slide2_desc }}</p>
        </div>

        <div class="slide">
          <div class="slide-icon-wrap slide-icon-wrap--privacy">
            <app-icon name="check" [size]="52" />
          </div>
          <h2 class="slide-title">{{ T().onboarding_slide3_title }}</h2>
          <p class="slide-desc">{{ T().onboarding_slide3_desc }}</p>
        </div>
      </div>
    </div>

    <div class="onboarding-dots" aria-hidden="true">
      @for (idx of slideIndices; track idx) {
        <button class="dot" [class.dot--active]="current() === idx" (click)="goTo(idx)"></button>
      }
    </div>

    <div class="onboarding-nav">
      <button
        class="btn-ghost"
        [style.visibility]="current() > 0 ? 'visible' : 'hidden'"
        (click)="back()"
      >
        {{ T().onboarding_back }}
      </button>
      <button class="btn-primary" (click)="next()">
        @if (current() < slideCount - 1) {
          {{ T().onboarding_next }}
        } @else {
          {{ T().onboarding_start }}
        }
      </button>
    </div>
  </div>
</div>
