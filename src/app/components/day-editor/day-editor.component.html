<div class="sheet-backdrop" (click)="close()"></div>
<div class="sheet">
  <div class="sheet-panel" appFocusTrap role="dialog" aria-modal="true">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h3 class="sheet-title">
        {{ isNew ? T().day_editor_new_title : T().day_editor_edit_title }}
      </h3>
      <button class="icon-btn" (click)="close()" [attr.aria-label]="T().close_btn">
        <app-icon name="x" [size]="16" />
      </button>
    </div>

    <div class="sheet-body">
      <div class="field">
        <label class="field-label">{{ T().day_editor_day_name }}</label>
        <input
          class="input"
          type="text"
          [placeholder]="T().day_editor_day_name_placeholder"
          [value]="dayName()"
          (input)="setDayName($event)"
        />
      </div>

      <div class="divider"></div>

      @for (ex of exercises(); track ex.id; let i = $index) {
        <div
          style="
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 12px 14px;
            margin-bottom: 10px;
          "
        >
          <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 10px">
            <input
              class="input"
              type="text"
              autocomplete="off"
              [placeholder]="T().day_editor_exercise_placeholder"
              style="flex: 1"
              [value]="ex.name"
              (input)="setExName(i, $event)"
              (focus)="focusName(i)"
              (blur)="blurName()"
            />
            <button
              class="icon-btn"
              (click)="moveUp(i)"
              [title]="T().exercise_move_up"
              [attr.aria-label]="T().exercise_move_up"
              [style.opacity]="i === 0 ? 0.3 : 1"
            >
              ↑
            </button>
            <button
              class="icon-btn"
              (click)="moveDown(i)"
              [title]="T().exercise_move_down"
              [attr.aria-label]="T().exercise_move_down"
              [style.opacity]="i === exercises().length - 1 ? 0.3 : 1"
            >
              ↓
            </button>
            <button
              class="icon-btn"
              (click)="removeExercise(i)"
              [title]="T().exercise_remove"
              [attr.aria-label]="T().exercise_remove"
              style="color: var(--danger)"
            >
              <app-icon name="trash" [size]="14" />
            </button>
          </div>

          @if (activeNameField() === i && activeSuggestions().length) {
            <div class="ex-suggest">
              <div class="ex-suggest-label">{{ T().day_editor_existing_title }}</div>
              @for (s of activeSuggestions(); track s.ex.id) {
                <button
                  class="ex-suggest-item"
                  type="button"
                  (pointerdown)="$event.preventDefault(); selectSuggestion(i, s.ex)"
                >
                  <span class="ex-suggest-name">{{ s.ex.name }}</span>
                  @if (s.sessions > 0) {
                    <span class="ex-suggest-hint">{{ sessionsLabel(s.sessions) }}</span>
                  }
                </button>
              }
            </div>
          }

          <div class="field-row">
            <div class="field">
              <label class="field-label">{{ T().day_editor_sets }}</label>
              <input
                class="input"
                type="number"
                min="1"
                max="10"
                [value]="ex.defaultSets"
                (input)="setExNum(i, 'defaultSets', $event)"
              />
            </div>
            <div class="field">
              <label class="field-label">{{ T().day_editor_rep_target }}</label>
              <input
                class="input"
                type="number"
                min="1"
                max="50"
                [value]="ex.defaultRepTarget"
                (input)="setExNum(i, 'defaultRepTarget', $event)"
              />
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <label class="field-label">{{ T().day_editor_brick }}</label>
              <input
                class="input"
                type="text"
                inputmode="decimal"
                [value]="ex.brick"
                (change)="setExBrick(i, $event)"
              />
            </div>
            <div class="field">
              <label class="field-label">{{ T().day_editor_rest }}</label>
              <input
                class="input"
                type="number"
                min="15"
                step="15"
                [value]="ex.restSeconds"
                (input)="setExNum(i, 'restSeconds', $event)"
              />
            </div>
          </div>

          <div class="field">
            <label class="field-label">{{ T().day_editor_unit }}</label>
            <select class="select" [value]="ex.unit" (change)="setExUnit(i, $event)">
              @for (unit of units; track unit) {
                <option [value]="unit">{{ tr.unitLabel(unit) }}</option>
              }
            </select>
          </div>
        </div>
      }

      <button class="btn" style="width: 100%; justify-content: center" (click)="addExercise()">
        <app-icon name="plus" [size]="14" />
        {{ T().day_editor_add_exercise }}
      </button>
    </div>

    <div class="sheet-footer">
      @if (!isNew) {
        <button class="btn btn-danger" (click)="deleteDay()">
          <app-icon name="trash" [size]="13" />
          {{ T().day_editor_delete_day }}
        </button>
      }
      <button class="btn btn-ghost" (click)="close()">{{ T().cancel }}</button>
      <button
        class="btn btn-primary"
        (click)="save()"
        [attr.disabled]="!dayName().trim() ? true : null"
      >
        {{ T().save }}
      </button>
    </div>
  </div>
</div>
