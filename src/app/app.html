<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">G</div>
      <span>Gym</span>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" (click)="toggleTheme()"
        [title]="theme() === 'dark' ? 'Modo claro' : 'Modo oscuro'">
        <app-icon [name]="theme() === 'dark' ? 'sun' : 'moon'" [size]="16"/>
      </button>
      <button class="icon-btn" title="Ajustes" (click)="uiState.showSettings.set(true)">
        <app-icon name="settings" [size]="16"/>
      </button>
    </div>
  </header>

  <router-outlet/>

  <nav class="bottom-nav">
    <button routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
      <app-icon name="home" [size]="18"/>
    </button>
    <button routerLink="/charts" routerLinkActive="active">
      <app-icon name="chart" [size]="18"/>
    </button>
    <button routerLink="/calendar" routerLinkActive="active">
      <app-icon name="calendar" [size]="18"/>
    </button>
  </nav>

  @if (uiState.restTimer()) {
    <app-rest-timer/>
  }

  @if (uiState.editingDay() !== null) {
    <app-day-editor/>
  }

  @if (uiState.showSettings()) {
    <app-settings/>
  }

  @if (uiState.dayDetail()) {
    <app-day-detail-sheet/>
  }

  @if (uiState.showDayPicker()) {
    <app-day-picker-sheet/>
  }

  @if (uiState.dayHistory()) {
    <app-day-history-sheet/>
  }
</div>
