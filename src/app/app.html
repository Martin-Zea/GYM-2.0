<div class="app">
  <header class="topbar" [class.training-active]="uiState.trainingActive()">
    <div class="brand">
      <div class="brand-mark">G</div>
      <span>{{ T().app_name }}</span>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn lang-btn" (click)="toggleLang()"
        [title]="T().settings_language">
        <span class="lang-label">{{ tr.lang() === 'es' ? 'EN' : 'ES' }}</span>
      </button>
      <button class="icon-btn" (click)="toggleTheme()"
        [title]="theme() === 'dark' ? T().theme_toggle_dark : T().theme_toggle_light">
        <app-icon [name]="theme() === 'dark' ? 'sun' : 'moon'" [size]="16"/>
      </button>
      <button class="icon-btn" [title]="T().settings_btn" (click)="uiState.showSettings.set(true)">
        <app-icon name="settings" [size]="16"/>
      </button>
    </div>
  </header>

  <nav class="bottom-nav">
    <button routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" title="Inicio">
      <app-icon name="home" [size]="18"/>
    </button>
    <button routerLink="/charts" routerLinkActive="active" title="Gráficos">
      <app-icon name="chart" [size]="18"/>
    </button>
    <button routerLink="/calendar" routerLinkActive="active" title="Calendario">
      <app-icon name="calendar" [size]="18"/>
    </button>
  </nav>

  <main class="app-content">
    <router-outlet/>
  </main>

  @if (uiState.restTimer()) {
    <app-rest-timer/>
  }

  @if (uiState.editingDay() !== null) {
    <app-day-editor/>
  }

  @if (uiState.showSettings()) {
    <app-settings/>
  }

  @if (uiState.dayDetail()) {
    <app-day-detail-sheet/>
  }

  @if (uiState.showDayPicker()) {
    <app-day-picker-sheet/>
  }

  @if (uiState.dayHistory()) {
    <app-day-history-sheet/>
  }
</div>
